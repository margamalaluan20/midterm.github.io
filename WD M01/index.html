<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <title>Genshin Impact Archive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root { --theme-dark: #0a1128; --theme-card: #162447; --theme-accent: #00b4d8; --theme-accent-hover: #90e0ef; --text-light: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--theme-dark); color: var(--text-light) !important; min-height: 100vh; display: flex; flex-direction: column; background-color: transparent !important; transition: background-color 0.4s ease, color 0.4s ease; }
        
        /* IBALIK ANG ANCIENT FONT SA SUBTITLE AT VIEW ALL */
        h1, h2, h3, h4, h5, h6, .ancient-modern-title, .navbar-brand, #pageSubtitle, .view-all-btn { font-family: 'Cinzel Decorative', serif !important; }
        
        .navbar { background-color: rgba(10, 17, 40, 0.95) !important; border-bottom: 2px solid var(--theme-accent); transition: background-color 0.4s ease; }
        .navbar-brand { color: var(--theme-accent) !important; font-size: 1.8rem; font-weight: 700; }
        .nav-link { color: var(--text-light) !important; transition: color 0.3s; cursor: pointer; font-weight: 600; }
        .nav-link:hover, .nav-link.active { color: var(--theme-accent-hover) !important; }
        .hero { background: radial-gradient(circle, var(--theme-card) 0%, var(--theme-dark) 100%); padding: 3rem 0; text-align: center; border-bottom: 1px solid rgba(0, 180, 216, 0.3); background: transparent !important; }
        .theme-toggle-btn { background: transparent; border: 1px solid var(--theme-accent); color: var(--theme-accent); width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; font-size: 1.1rem; }
        .theme-toggle-btn:hover { background: var(--theme-accent); color: var(--theme-dark); box-shadow: 0 0 10px rgba(0, 180, 216, 0.5); }
        
        [data-bs-theme="light"] { --theme-accent: #00b4d8; --theme-accent-hover: #0077b6; --text-light: #ffffff; }
        [data-bs-theme="light"] .video-bg-container::after { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255, 255, 255, 0.5); z-index: -1; }
        [data-bs-theme="light"] #bgVideo { filter: brightness(100%) contrast(100%); }
        [data-bs-theme="light"] .genshin-card, [data-bs-theme="light"] .bg-dark { background-color: rgba(10, 17, 40, 0.85) !important; border-color: rgba(0, 180, 216, 0.5); }
        [data-bs-theme="light"] .detail-container, [data-bs-theme="light"] .form-control, [data-bs-theme="light"] .form-select, [data-bs-theme="light"] .input-group-text, [data-bs-theme="light"] .badge.bg-dark { background-color: rgba(10, 17, 40, 0.9) !important; color: #ffffff !important; border-color: rgba(0, 180, 216, 0.4) !important; }
        [data-bs-theme="light"] .navbar { background-color: rgba(10, 17, 40, 0.98) !important; }
        [data-bs-theme="light"] .reaction-box { background: rgba(10, 17, 40, 0.8); }
        [data-bs-theme="light"] .form-control::placeholder { color: #b0c4de !important; }
        
        /* FIX PARA MAKITA ANG TEXT SA LIGHT MODE (SUBTITLE, LOADER, SEARCH MSG) */
        [data-bs-theme="light"] #pageSubtitle, [data-bs-theme="light"] #loader p, [data-bs-theme="light"] #searchResults .text-light { color: #0a1128 !important; font-weight: 700; text-shadow: 0px 0px 5px rgba(255,255,255,0.8); }

        .genshin-card { background-color: rgba(22, 36, 71, 0.7) !important; backdrop-filter: blur(10px); border: 1px solid rgba(0, 180, 216, 0.3); border-radius: 12px; transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem 1rem; width: 100%; aspect-ratio: 1 / 1; text-align: center; }
        .domain-card { aspect-ratio: auto !important; min-height: 80px; padding: 1rem 0.8rem !important; }
        .genshin-card:hover { transform: translateY(-5px); border-color: var(--theme-accent); box-shadow: 0 8px 20px rgba(0, 180, 216, 0.2); }
        .item-icon { width: 95px; height: 95px; object-fit: contain; margin-bottom: 1rem; border-radius: 50%; background-color: rgba(0,0,0,0.3); padding: 5px; animation: float 3s ease-in-out infinite; transition: all 0.3s ease; flex-shrink: 0; }
        .genshin-card:hover .item-icon { animation: float 1.5s ease-in-out infinite; transform: scale(1.1); filter: drop-shadow(0 0 15px var(--theme-accent)); }
        .item-name { color: var(--theme-accent); text-transform: capitalize; font-size: 1.05rem; font-weight: 600; margin-bottom: 0; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #loader { display: none; color: var(--theme-accent); }
        .video-bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; background-color: #0a1128; }
        #bgVideo { width: 100vw; height: 100vh; object-fit: cover; filter: brightness(45%) contrast(110%); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: filter 0.4s ease; }
        .detail-container { background-color: rgba(22, 36, 71, 0.9); backdrop-filter: blur(15px); border-radius: 20px; padding: 2rem; border: 1px solid var(--theme-accent); animation: fadeIn 0.5s ease-in-out; }
        .detail-img { width: 200px; height: 200px; object-fit: contain; filter: drop-shadow(0 0 15px var(--theme-accent)); animation: float 4s ease-in-out infinite, breathingGlow 4s infinite; }
        .stat-label { color: var(--theme-accent); font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .back-btn { background-color: transparent; color: var(--theme-accent); border: 1px solid var(--theme-accent); border-radius: 30px; padding: 0.4rem 1.5rem; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .back-btn:hover { background-color: var(--theme-accent); color: var(--theme-dark); box-shadow: 0 0 15px rgba(0, 180, 216, 0.6); transform: translateX(-5px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-5px) rotate(2deg); } }
        @keyframes breathingGlow { 0%, 100% { filter: drop-shadow(0 0 5px var(--theme-accent)); } 50% { filter: drop-shadow(0 0 20px var(--theme-accent-hover)); } }
        .reaction-box { background: rgba(10, 17, 40, 0.6); border-radius: 10px; padding: 15px; margin-top: 10px; border: 1px dashed var(--theme-accent); }
        .view-all-btn { color: var(--theme-accent); border: 1px solid var(--theme-accent); background: transparent; border-radius: 30px; padding: 0.3rem 1.2rem; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
        .view-all-btn:hover { background: var(--theme-accent); color: var(--theme-dark); box-shadow: 0 0 15px rgba(0, 180, 216, 0.6); transform: translateX(5px); }
        .ancient-modern-title { background: linear-gradient(45deg, var(--theme-accent), #ffffff, var(--theme-accent-hover)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(0, 180, 216, 0.5); letter-spacing: 2px; font-weight: 700; transition: all 0.3s ease; }
        .ancient-modern-title:hover { text-shadow: 0 0 30px rgba(144, 224, 239, 0.8); transform: scale(1.02); }
        .custom-scroll::-webkit-scrollbar { width: 6px; } .custom-scroll::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 10px; } .custom-scroll::-webkit-scrollbar-thumb { background: var(--theme-accent); border-radius: 10px; } .custom-scroll::-webkit-scrollbar-thumb:hover { background: var(--theme-accent-hover); }
        .no-image-placeholder { display: flex; align-items: center; justify-content: center; background-color: rgba(0,0,0,0.3); color: var(--theme-accent); font-weight: bold; text-transform: uppercase; border: 1px dashed var(--theme-accent); text-align: center; }
        .no-image-placeholder.icon-size { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 1rem auto; font-size: 0.6rem; }
        .no-image-placeholder.detail-size { width: 200px; height: 200px; border-radius: 20px; margin: 0 auto 1.5rem auto; font-size: 1.2rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="video-bg-container"><video autoplay muted loop playsinline id="bgVideo"><source src="assets/bg_video.mp4" type="video/mp4"></video></div>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm py-1">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center py-0" href="#" onclick="loadPage('home')">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/027/127/497/small_2x/genshin-impact-logo-genshin-impact-icon-transparent-free-png.png" alt="Genshin Logo" style="height: 100px; margin-top: -20px; margin-bottom: -20px;" class="me-3">
                <span class="ancient-modern-title fs-3 mt-2">Genshin Impact Archive</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: var(--theme-accent);"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link active" id="nav-home" onclick="loadPage('home')">Home</a></li>
                    <li class="nav-item"><a class="nav-link" id="nav-search" onclick="loadSearchPage()">Search</a></li>
                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0 mb-2 mb-lg-0"><button id="themeToggle" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle Theme"><i class="bi bi-brightness-high-fill" id="themeIcon"></i></button></li>
                </ul>
            </div>
        </div>
    </nav>
    <header class="hero"><div class="container"><h1 id="pageTitle" class="display-4 ancient-modern-title">Welcome, Traveler!</h1><p id="pageSubtitle" class="lead text-light">Ad Astra Abyssosque! Step into the vast world of Teyvat.</p></div></header>
    <main class="container my-5 flex-grow-1"><div id="loader" class="text-center my-5"><div class="spinner-border" role="status"></div><p class="mt-3">Connecting to Irminsul...</p></div><div class="row g-4" id="dataGrid"></div></main>
    <footer class="text-center py-4" style="background-color: var(--theme-card); border-top: 1px solid rgba(0, 180, 216, 0.3); transition: background-color 0.4s ease;"><p class="mb-0 small text-light opacity-75">Powered by genshin.jmp.blue API | Ad Astra Abyssosque</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        const baseUrl='https://genshin.jmp.blue', dataGrid=document.getElementById('dataGrid'), loader=document.getElementById('loader'), pageTitle=document.getElementById('pageTitle'), pageSubtitle=document.getElementById('pageSubtitle');
        let allDataCache = {};
        const pageInfo = { home: {title:"Welcome, Traveler!",sub:"Ad Astra Abyssosque! Step into the vast world of Teyvat."}, characters: {title:"Characters",sub:"Explore the heroes traversing the world of Teyvat."}, weapons: {title:"Weapons",sub:"Discover the armaments forged for battle."}, artifacts: {title:"Artifacts",sub:"Relics of the past that bestow great power."}, consumables: {title:"Consumables",sub:"Dishes and potions to aid your journey."}, materials: {title:"Materials",sub:"Resources collected across Teyvat for ascensions and enhancements."}, elements: {title:"Elements",sub:"The fundamental powers that shape the world."}, nations: {title:"Nations",sub:"The seven regions ruled by the Archons."}, domains: {title:"Domains",sub:"Ancient ruins holding powerful rewards."}, enemies: {title:"Enemies",sub:"Formidable foes lurking across Teyvat."}, search: {title:"Archive Search",sub:"Search Irminsul for all knowledge."} };

        function initTheme() { const t=localStorage.getItem('genshinTheme')||'dark'; document.documentElement.setAttribute('data-bs-theme',t); if(t==='light') document.getElementById('themeIcon')?.classList.replace('bi-brightness-high-fill','bi-moon-fill'); }
        function toggleTheme() { const el=document.documentElement, ic=document.getElementById('themeIcon'), n=el.getAttribute('data-bs-theme')==='dark'?'light':'dark'; el.setAttribute('data-bs-theme',n); localStorage.setItem('genshinTheme',n); n==='light'?ic.classList.replace('bi-brightness-high-fill','bi-moon-fill'):ic.classList.replace('bi-moon-fill','bi-brightness-high-fill'); }
        function getFallbackUrls(id) { let f=id.split('-').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join('_'); return [`https://genshin-impact.fandom.com/wiki/Special:FilePath/Item_${f}.png`]; }
        window.handleImageFallback = function(img, id, isDtl) { let a=parseInt(img.getAttribute('data-attempt')||'0'), u=getFallbackUrls(id); if(a<u.length){ img.src=u[a]; img.setAttribute('data-attempt',a+1); } else img.outerHTML=`<div class='no-image-placeholder ${isDtl?"detail-size":"icon-size"}'>No Image</div>`; };

        function flattenMaterials(data, sub) { let items=[]; if(!data) return items; const trav=(o,pk)=>{ if(typeof o==='string'){ items.push({id:o,subcat:sub,details:{name:o.replace(/-/g,' '),description:'A material from Teyvat.'}}); return; } if(Array.isArray(o)) return o.forEach(v=>trav(v,pk)); if(typeof o==='object'&&o!==null){ if(o.name) items.push({id:o.id||o.name.toLowerCase().replace(/[']/g,'').replace(/[^a-z0-9]+/g,'-'),subcat:sub,details:o}); else for(let k in o) trav(o[k],k); } }; trav(data,''); return items; }
        
        async function fetchCategoryItems(cat) {
            if(cat==='materials'){ let items=[]; await Promise.all(['boss-material','character-ascension','character-experience','common-ascension','local-specialties','talent-book','talent-boss','weapon-ascension','weapon-experience'].map(async s=>{try{const r=await fetch(`${baseUrl}/materials/${s}`); if(r.ok) items=items.concat(flattenMaterials(await r.json(),s));}catch(e){}})); return Array.from(new Map(items.map(i=>[i.id,i])).values()); }
            if(cat==='consumables'){ const [f,p]=await Promise.all([fetch(`${baseUrl}/consumables/food`).catch(()=>null),fetch(`${baseUrl}/consumables/potions`).catch(()=>null)]); let items=[]; if(f&&f.ok){ let fd=await f.json(); items=items.concat((Array.isArray(fd)?fd:Object.keys(fd)).map(k=>({id:k,subcat:'food'}))); } if(p&&p.ok){ let pd=await p.json(); items=items.concat((Array.isArray(pd)?pd:Object.keys(pd)).map(k=>({id:k,subcat:'potions'}))); } return items; }
            const r=await fetch(`${baseUrl}/${cat}`); let d=await r.json(); return Array.isArray(d)?d:Object.keys(d);
        }
        function getConsumableImageUrls(id) { let f=id.split('-').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join('_'); return {primary:`https://genshin-impact.fandom.com/wiki/Special:FilePath/Item_${f}.png`,secondary:`https://genshin-impact.fandom.com/wiki/Special:FilePath/${f}.png`}; }
        async function fetchAllData() { if(Object.keys(allDataCache).length) return; for(const c of ['characters','weapons','artifacts','consumables','materials','elements','nations','domains','enemies']) try{ allDataCache[c]=await fetchCategoryItems(c); }catch(e){} }

        async function loadSearchPage() { document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); document.getElementById('nav-search').classList.add('active'); pageTitle.textContent=pageInfo.search.title; pageSubtitle.textContent=pageInfo.search.sub; dataGrid.innerHTML=`<div class="col-12 mb-4 d-flex justify-content-center"><div class="input-group shadow-sm" style="max-width: 600px; border-radius: 8px; overflow: hidden;"><select id="searchFilter" class="form-select bg-dark text-light border-0" style="max-width: 150px; cursor:pointer;"><option value="all">All Categories</option><option value="characters">Characters</option><option value="weapons">Weapons</option><option value="artifacts">Artifacts</option><option value="consumables">Consumables</option><option value="materials">Materials</option><option value="elements">Elements</option><option value="nations">Nations</option><option value="domains">Domains</option><option value="enemies">Enemies</option></select><input type="text" id="searchInput" class="form-control bg-dark text-light border-0" placeholder="Type a category or item..." onkeyup="if(event.key==='Enter') executeSearch()"><button class="btn btn-info text-dark fw-bold px-3" onclick="executeSearch()">Search</button><button class="btn btn-outline-danger px-3" onclick="clearSearch()">Clear</button></div></div><div id="searchResults" class="row g-4 w-100 m-0"></div>`; loader.style.display='block'; await fetchAllData(); loader.style.display='none'; }
        
        function executeSearch() {
            let q=document.getElementById('searchInput').value.toLowerCase().trim(), f=document.getElementById('searchFilter').value, rc=document.getElementById('searchResults'); rc.innerHTML=''; if(!q) return rc.innerHTML='<div class="col-12 text-center text-light mt-4">Please enter a search term.</div>';
            let tc=q; if(q==='character') tc='characters'; if(q==='weapon') tc='weapons'; if(q==='artifact') tc='artifacts'; if(['consumable','food','potion','foods','potions'].includes(q)) tc='consumables'; if(q==='material') tc='materials'; if(q==='element') tc='elements'; if(['nation','region','regions'].includes(q)) tc='nations'; if(q==='domain') tc='domains'; if(q==='enemy') tc='enemies';
            if(['characters','weapons','artifacts','consumables','materials','elements','nations','domains','enemies'].includes(tc)&&f==='all') return loadPage(tc);
            let res=[]; (f==='all'?Object.keys(allDataCache):[f]).forEach(c=>{ if(allDataCache[c]) allDataCache[c].filter(i=>{let is=typeof i==='object'?(i.details?.name?.toLowerCase()||i.id):i; return typeof is==='string'&&is.includes(q);}).forEach(m=>res.push({cat:c,item:m})); });
            if(!res.length) return rc.innerHTML='<div class="col-12 text-center text-light mt-4">No records found.</div>';
            res.forEach(r=>{ let i=r.item, is=typeof i==='object'?i.id:i, dn=typeof i==='object'&&i.details?.name?i.details.name:(typeof is==='string'?is.replace(/-/g,' ').replace(/ s /g,"'s "):'Unknown'), img=`${baseUrl}/${r.cat}/${is}/icon`, fb=`onerror="this.outerHTML='<div class=\\'no-image-placeholder icon-size\\'>No Image</div>'"`; if(r.cat==='artifacts') img=`${baseUrl}/${r.cat}/${is}/flower-of-life`; if(is==='glacier-and-snowfield') img=`https://genshin.jmp.blue/artifacts/blizzard-strayer/flower-of-life`; if(r.cat==='consumables'||r.cat==='materials'){ let u=getConsumableImageUrls(is); img=u.primary; fb=`onerror="this.onerror=null;this.src='${u.secondary}';this.addEventListener('error',()=>this.outerHTML='<div class=\\'no-image-placeholder icon-size\\'>No Image</div>');"`;} rc.insertAdjacentHTML('beforeend',`<div class="col-6 col-md-4 col-lg-3 card-item"><div class="genshin-card ${r.cat==='domains'?'domain-card':''}" style="cursor: pointer;" onclick="loadDetails('${r.cat}', '${is}')"><span class="badge bg-dark border border-info mb-2" style="font-size: 0.6rem; text-transform:uppercase;">${r.cat}</span>${r.cat!=='domains'?`<img src="${img}" alt="${dn}" class="item-icon" ${fb}>`:''}<h3 class="item-name">${dn}</h3></div></div>`); });
        }
        function clearSearch() { document.getElementById('searchInput').value=''; document.getElementById('searchFilter').value='all'; document.getElementById('searchResults').innerHTML=''; }
        function filterCategory(cid) { let q=document.getElementById('categorySearchInput').value.toLowerCase().trim(); document.getElementById(cid)?.querySelectorAll('.card-item').forEach(c=>c.style.display=c.querySelector('.item-name').innerText.toLowerCase().includes(q)?'':'none'); }
        function clearCategorySearch(cid) { let i=document.getElementById('categorySearchInput'); if(i) i.value=''; filterCategory(cid); }

        async function loadPage(ep) {
            document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); let nav=document.getElementById(ep==='home'?'nav-home':'nav-search'); if(nav) nav.classList.add('active');
            let t=pageInfo[ep]||pageInfo['home']; pageTitle.textContent=t.title; pageSubtitle.textContent=t.sub; dataGrid.innerHTML=''; loader.style.display='block';
            try {
                if(ep==='home') {
                    for(const c of ['characters','weapons','artifacts','consumables','materials','elements','nations','domains','enemies']) {
                        const items=await fetchCategoryItems(c), did=`home-dashboard-${c}`;
                        dataGrid.insertAdjacentHTML('beforeend',`<div class="col-12 mt-5 mb-3 d-flex justify-content-between align-items-end border-bottom border-info pb-2"><h2 class="text-accent mb-0 ancient-modern-title text-capitalize">${c.replace(/-/g,' ')}</h2><button class="view-all-btn" onclick="loadPage('${c}')">View All <i class="bi bi-chevron-double-right"></i></button></div><div id="${did}" class="row g-4 w-100 m-0"></div>`);
                        items.slice(0,4).forEach(i=>renderCard(c,i,did));
                    }
                } else {
                    const did=`dashboard-${ep}`;
                    dataGrid.insertAdjacentHTML('beforeend',`<div class="col-12 mb-4"><div class="d-flex align-items-center border-bottom border-info pb-3 mb-4"><button class="back-btn me-3" onclick="loadPage('home')"><i class="bi bi-arrow-left"></i> Back Home</button><h2 class="text-accent mb-0 ancient-modern-title text-capitalize">All ${ep.replace(/-/g,' ')}</h2></div><div class="d-flex justify-content-start"><div class="input-group shadow-sm" style="max-width: 400px; border-radius: 8px; overflow: hidden;"><span class="input-group-text bg-dark text-info border-0"><i class="bi bi-search"></i></span><input type="text" id="categorySearchInput" class="form-control bg-dark text-light border-0" placeholder="Filter ${ep.replace(/-/g,' ')}..." onkeyup="filterCategory('${did}')"><button class="btn btn-outline-danger px-3" onclick="clearCategorySearch('${did}')">Clear</button></div></div></div><div id="${did}" class="row g-4 w-100 m-0"></div>`);
                    (await fetchCategoryItems(ep)).forEach(i=>renderCard(ep,i,did));
                }
            } catch(e) { dataGrid.innerHTML=`<div class="col-12 text-center text-danger"><p>Failed to connect to the Ley Lines.</p></div>`; }
            loader.style.display='none';
        }

        function renderCard(ep, iD, tid=null) {
            let i=typeof iD==='object'?iD.id:iD, dn=typeof iD==='object'&&iD.details?.name?iD.details.name:(typeof i==='string'?i.replace(/-/g,' ').replace(/ s /g,"'s "):'Unknown'), img=`${baseUrl}/${ep}/${i}/icon`, fb=`onerror="this.outerHTML='<div class=\\'no-image-placeholder icon-size\\'>No Image</div>'"`;
            if(ep==='artifacts') img=`${baseUrl}/${ep}/${i}/flower-of-life`; if(i==='glacier-and-snowfield') img=`https://genshin.jmp.blue/artifacts/blizzard-strayer/flower-of-life`; if(ep==='consumables'||ep==='materials'){ let u=getConsumableImageUrls(i); img=u.primary; fb=`onerror="this.onerror=null;this.src='${u.secondary}';this.addEventListener('error',()=>this.outerHTML='<div class=\\'no-image-placeholder icon-size\\'>No Image</div>');"`; }
            let c=`<div class="col-6 col-md-4 col-lg-3 card-item"><div class="genshin-card ${ep==='domains'?'domain-card':''}" style="cursor: pointer;" onclick="loadDetails('${ep}', '${i}')">${ep!=='domains'?`<img src="${img}" alt="${dn}" class="item-icon" ${fb}>`:''}<h3 class="item-name">${dn}</h3></div></div>`;
            tid?document.getElementById(tid)?.insertAdjacentHTML('beforeend',c):dataGrid.insertAdjacentHTML('beforeend',c);
        }

        async function loadDetails(ep, item) {
            dataGrid.innerHTML=''; loader.style.display='block'; window.scrollTo(0,0);
            try {
                let d, dImg=`${baseUrl}/${ep}/${item}/icon`, fbD=`onerror="this.outerHTML='<div class=\\'no-image-placeholder detail-size\\'>No Image</div>'"`, dn=typeof item==='string'?item.replace(/-/g,' '):'Unknown', h='';
                if(ep==='materials') { let c=allDataCache['materials']?.find(m=>m.id===item); if(c?.details){d=c.details; d.matType=c.subcat;}else throw 1; let u=getConsumableImageUrls(item); dImg=u.primary; fbD=`onerror="this.onerror=null;this.src='${u.secondary}';this.addEventListener('error',()=>this.outerHTML='<div class=\\'no-image-placeholder detail-size\\'>No Image</div>');"`; if(!d.name)d.name=item.replace(/-/g,' '); }
                else if(ep==='consumables') { let[fR,pR]=await Promise.all([fetch(`${baseUrl}/consumables/food`).catch(()=>null),fetch(`${baseUrl}/consumables/potions`).catch(()=>null)]); let f=fR?.ok?await fR.json():{}, p=pR?.ok?await pR.json():{}; if(f[item])d=typeof f[item]==='object'?f[item]:{description:"A food item."}; else if(p[item])d=typeof p[item]==='object'?p[item]:{description:"A potion."}; else throw 1; let u=getConsumableImageUrls(item); dImg=u.primary; fbD=`onerror="this.onerror=null;this.src='${u.secondary}';this.addEventListener('error',()=>this.outerHTML='<div class=\\'no-image-placeholder detail-size\\'>No Image</div>');"`; if(!d.name)d.name=item.replace(/-/g,' '); }
                else { let r=await fetch(`${baseUrl}/${ep}/${item}`); if(!r.ok)throw 1; d=await r.json(); }
                if(ep==='characters') dImg=`${baseUrl}/characters/${item}/portrait`; if(ep==='artifacts') dImg=`${baseUrl}/artifacts/${item}/flower-of-life`;
                let imgT=`<img src="${dImg}" class="detail-img mb-4" ${fbD}>`, sr='⭐'.repeat(d.rarity||d.max_rarity||0)||'Unknown', nm=`<h1 class="display-4 fw-bold text-accent ancient-modern-title">${d.name||dn}</h1>`;

                if(ep==='materials') {
                    let sD=[].concat(d.source||d.sources||[]), dlD=[].concat(d.drop||d.location||[]);
                    h=`${imgT}${nm}<p class="lead mb-4 fst-italic">"${d.description||'A resource from Teyvat.'}"</p><div class="row mt-4 text-start justify-content-center"><div class="col-md-5 p-3 bg-dark border-start border-4 border-info m-2 shadow"><p><span class="stat-label">Cat:</span> ${(d.matType||'Material').replace(/-/g,' ')}</p><p><span class="stat-label">Type:</span> ${d.type||'Resource'}</p></div><div class="col-md-5 p-3 bg-dark border-start border-4 border-info m-2 shadow"><p><span class="stat-label">Rarity:</span> ${sr}</p></div></div><div class="row mt-3 text-start justify-content-center"><div class="col-md-5 p-3 bg-dark shadow mx-2"><h5 class="text-accent mb-2">Sources</h5><ul class="small text-light opacity-75">${sD.length?sD.map(s=>`<li><i class="bi bi-caret-right-fill text-info"></i> ${s}</li>`).join(''):'<li>No specific source.</li>'}</ul></div><div class="col-md-5 p-3 bg-dark shadow mx-2"><h5 class="text-accent mb-2">Locations</h5><ul class="small text-light opacity-75">${dlD.length?dlD.map(l=>`<li><i class="bi bi-caret-right-fill text-info"></i> ${l}</li>`).join(''):'<li>Found in Teyvat.</li>'}</ul></div></div>`;
                } else if(ep==='consumables') {
                    let rD=d.recipe||d.crafting||[];
                    h=`${imgT}${nm}<p class="lead mb-4 fst-italic">"${d.description||''}"</p><div class="row mt-4 text-start justify-content-center"><div class="col-md-5 p-3 bg-dark border-start border-4 border-info m-2 shadow"><p><span class="stat-label">Type:</span> ${d.type||'Consumable'}</p><p><span class="stat-label">Rarity:</span> ${sr}</p></div><div class="col-md-5 p-3 bg-dark border-start border-4 border-info m-2 shadow"><p><span class="stat-label">Effect:</span> ${d.effect||'None'}</p></div></div><div class="row mt-3 justify-content-center text-start"><div class="col-md-10 p-3 bg-dark shadow"><h5 class="text-accent mb-2">Recipe</h5><ul class="small text-light opacity-75">${rD.length?rD.map(i=>`<li>${i.quantity}x ${i.item.replace(/-/g,' ')}</li>`).join(''):'<li>Available via shops/exploration.</li>'}</ul></div></div>`;
                } else if(ep==='characters') {
                    const skill=d.skillTalents?.map(s=>`<div class="col-md-4 mb-3"><div class="p-3 bg-dark shadow h-100"><h6 class="text-info">${s.name} <span class="small text-muted">(${s.unlock})</span></h6><div class="custom-scroll" style="max-height:100px;overflow-y:auto;"><p class="small opacity-75">${s.description}</p></div></div></div>`).join('')||'';
                    h=`${imgT}${nm}<p class="lead mb-4 fst-italic">"${d.description||''}"</p><div class="row text-start justify-content-center mb-4"><div class="col-md-5 p-3 bg-dark border-start border-4 border-info m-2 shadow"><p><span class="stat-label">Vision:</span> ${d.vision}</p><p><span class="stat-label">Weapon:</span> ${d.weapon}</p><p><span class="stat-label">Rarity:</span> ${sr}</p></div><div class="col-md-5 p-3 bg-dark border-start border-4 border-info m-2 shadow"><p><span class="stat-label">Nation:</span> ${d.nation}</p><p><span class="stat-label">Affiliation:</span> ${d.affiliation}</p><p><span class="stat-label">Constellation:</span> ${d.constellation}</p></div></div><div class="row text-start">${skill}</div>`;
                } else if(ep==='weapons') {
                    h=`${imgT}${nm}<p class="lead mb-4 fst-italic">"${d.description||''}"</p><div class="row text-start justify-content-center mb-4"><div class="col-md-5 p-3 bg-dark border-start border-4 border-info m-2 shadow"><p><span class="stat-label">Type:</span> ${d.type||d.weapontype}</p><p><span class="stat-label">Rarity:</span> ${sr}</p></div><div class="col-md-5 p-3 bg-dark border-start border-4 border-info m-2 shadow"><p><span class="stat-label">Base ATK:</span> ${d.baseAttack||d.baseAtk}</p><p><span class="stat-label">Sub Stat:</span> ${d.subStat||'None'}</p></div></div>${d.passiveName?`<div class="row justify-content-center text-start"><div class="col-md-10 p-3 bg-dark shadow"><h5 class="text-accent mb-2">Passive: ${d.passiveName}</h5><p class="small opacity-75">${d.passiveDesc}</p></div></div>`:''}`;
                } else if(ep==='artifacts') {
                    h=`${imgT}${nm}<div class="row mt-4 text-start justify-content-center mb-4"><div class="col-md-6 p-3 bg-dark border-start border-4 border-info m-2 shadow"><p><span class="stat-label">Max Rarity:</span> ${sr}</p></div></div><div class="row mt-3 justify-content-center text-start"><div class="col-md-10 p-3 bg-dark shadow"><h5 class="text-accent mb-3">Set Bonuses</h5><h6 class="text-info">2-Piece</h6><p class="small opacity-75">${d['2-piece_bonus']||'N/A'}</p><h6 class="text-info">4-Piece</h6><p class="small opacity-75">${d['4-piece_bonus']||'N/A'}</p></div></div>`;
                } else if(ep==='enemies') {
                    let dL=[].concat(d.drops||d.props||[]);
                    h=`${imgT}${nm}<div class="row mt-4 text-start justify-content-center mb-4"><div class="col-md-5 p-3 bg-dark border-start border-4 border-info m-2 shadow"><p><span class="stat-label">Family:</span> ${d.family}</p><p><span class="stat-label">Faction:</span> ${d.faction}</p></div><div class="col-md-5 p-3 bg-dark border-start border-4 border-info m-2 shadow"><p><span class="stat-label">Elements:</span> ${d.elements?.join(', ')||'None'}</p></div></div><div class="row justify-content-center text-start"><div class="col-md-10 p-3 bg-dark shadow mb-3"><h5 class="text-accent mb-2">Profile</h5><p class="small opacity-75">${d.description||'N/A'}</p></div><div class="col-md-10 p-3 bg-dark shadow"><h5 class="text-accent mb-2">Drops</h5><ul class="small opacity-75">${dL.length?dL.map(dr=>`<li>${dr.name||dr}</li>`).join(''):'<li>N/A</li>'}</ul></div></div>`;
                } else if(ep==='domains') {
                    h=`${nm}<p class="lead mb-3 text-light">${d.description||'An ancient domain.'}</p><p class="text-info mb-4"><span class="stat-label text-light">Nation:</span> ${d.nation}</p><div class="row mt-4 text-start justify-content-center"><div class="col-md-8 p-3 bg-dark border border-info shadow"><h5 class="text-accent mb-2">Details</h5><p class="mt-3 stat-label">Req AR: ${d.recommended_ar||'Varies'}</p><p class="stat-label">Rec Elements: <span class="text-light">${d.recommended_elements?.join(', ')||'Any'}</span></p></div></div>`;
                } else if(ep==='elements'||ep==='nations') {
                    h=`${imgT}${nm}<p class="lead mb-4 fst-italic">"${d.description||`The ${d.name} region.`}"</p><div class="row text-start justify-content-center"><div class="col-md-8 p-3 bg-dark shadow"><h5 class="text-accent mb-2">Details</h5><p class="small opacity-75">Check Interactive Map for more lore and reactions.</p></div></div>`;
                } else {
                    h=`${imgT}<h1 class="display-5 fw-bold text-accent ancient-modern-title">${d.name||dn}</h1><p class="lead">${d.description||'Data fetched from Irminsul.'}</p>`;
                }
                dataGrid.innerHTML=`<div class="col-12"><div class="detail-container text-center">${h}</div></div><div class="col-12 text-center mt-4"><button class="back-btn" onclick="loadPage('${ep}')"><i class="bi bi-arrow-left"></i> Back to ${ep}</button></div>`;
            } catch(e) { dataGrid.innerHTML=`<div class="col-12 text-center text-danger"><p>Data error.</p><button class="back-btn" onclick="loadPage('home')">Back Home</button></div>`; }
            loader.style.display='none';
        }
        window.onload = () => { initTheme(); loadPage('home'); };
    </script>
</body>
</html>
