<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Genshin Impact Archive</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        /* BLUE THEME PALETTE */
        --theme-dark: #0a1128;        
        --theme-card: #162447;       
        --theme-accent: #00b4d8;      
        --theme-accent-hover: #90e0ef;
        --text-light: #f8fafc;        
      }
      
      body {
        background-color: var(--theme-dark);
        color: var(--text-light);
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      h1, h2, h3, .navbar-brand, .nav-link {
        font-family: 'Montserrat', sans-serif;
      }

      .navbar {
        background-color: rgba(10, 17, 40, 0.95) !important;
        border-bottom: 2px solid var(--theme-accent);
      }

      .navbar-brand {
        color: var(--theme-accent) !important;
        font-size: 1.8rem;
        font-weight: 700;
      }

      .nav-link {
        color: var(--text-light) !important;
        transition: color 0.3s;
        cursor: pointer;
        font-weight: 600;
      }

      .nav-link:hover, .nav-link.active {
        color: var(--theme-accent-hover) !important;
      }

      .hero {
        background: radial-gradient(circle, var(--theme-card) 0%, var(--theme-dark) 100%);
        padding: 3rem 0;
        text-align: center;
        border-bottom: 1px solid rgba(0, 180, 216, 0.3); /* Transparent accent */
      }

      .genshin-card {
        background-color: var(--theme-card);
        border: 1px solid rgba(0, 180, 216, 0.3);
        border-radius: 12px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        height: 100%;
        text-align: center;
        padding: 1.5rem 1rem;
      }

      .genshin-card:hover {
        transform: translateY(-5px);
        border-color: var(--theme-accent);
        box-shadow: 0 8px 20px rgba(0, 180, 216, 0.2);
      }

      .item-icon {
        width: 100px;
        height: 100px;
        object-fit: contain;
        margin-bottom: 1rem;
        border-radius: 50%;
        background-color: rgba(0,0,0,0.3);
        padding: 5px;
      }

      .item-name {
        color: var(--theme-accent);
        font-family: 'Montserrat', sans-serif;
        text-transform: capitalize;
        font-size: 1.1rem;
        font-weight: 600;
      }

      #loader { display: none; color: var(--theme-accent); }

      .video-bg-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    overflow: hidden;
    background-color: #0a1128; 
}

#bgVideo {
    width: 100vw;
    height: 100vh;
    object-fit: cover; 
    filter: brightness(45%) contrast(110%); 
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}


.genshin-card {
    background-color: rgba(22, 36, 71, 0.7) !important;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0, 180, 216, 0.3);
    transition: all 0.3s ease;
}

body {
    background-color: transparent !important;
}

.hero {
    background: transparent !important;
}
/* Detail View Styles */
.detail-container {
    background-color: rgba(22, 36, 71, 0.9);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 2rem;
    border: 1px solid var(--theme-accent);
    animation: fadeIn 0.5s ease-in-out;
}

.detail-img {
    width: 250px;
    height: 250px;
    object-fit: contain;
    filter: drop-shadow(0 0 15px var(--theme-accent));
}

.stat-label {
    color: var(--theme-accent);
    font-weight: bold;
    text-transform: uppercase;
    font-size: 0.9rem;
}

.back-btn {
    background-color: transparent;
    color: var(--text-light);
    border: 1px solid var(--theme-accent);
    transition: all 0.3s ease;
}

.back-btn:hover {
    background-color: var(--theme-accent);
    color: var(--theme-dark);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes float {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(2deg); }
    100% { transform: translateY(0px) rotate(0deg); }
}

@keyframes breathingGlow {
    0% { filter: drop-shadow(0 0 5px var(--theme-accent)); }
    50% { filter: drop-shadow(0 0 20px var(--theme-accent-hover)); }
    100% { filter: drop-shadow(0 0 5px var(--theme-accent)); }
}

.item-icon {
    animation: float 3s ease-in-out infinite; /* Continuous na paggalaw */
    transition: all 0.3s ease;
}

.genshin-card:hover .item-icon {
    animation: float 1.5s ease-in-out infinite; /* Bibilis ang galaw */
    transform: scale(1.1);
    filter: drop-shadow(0 0 15px var(--theme-accent));
}

.detail-img {
    animation: float 4s ease-in-out infinite, breathingGlow 4s infinite;
}
.notable-people-badge {
    background: rgba(0, 180, 216, 0.1);
    border: 1px solid var(--theme-accent);
    color: var(--theme-accent-hover);
    padding: 5px 15px;
    border-radius: 20px;
    display: inline-block;
    margin: 5px;
    font-size: 0.85rem;
    transition: all 0.3s ease;
}

.notable-people-badge:hover {
    background: var(--theme-accent);
    color: var(--theme-dark);
}

.reaction-box {
    background: rgba(10, 17, 40, 0.6);
    border-radius: 10px;
    padding: 15px;
    margin-top: 10px;
    border: 1px dashed var(--theme-accent);
}
    </style>
  </head>
  <body>

    <div class="video-bg-container">
    <video autoplay muted loop playsinline id="bgVideo">
        <source src="assets/bg_video.mp4" type="video/mp4">
    </video>
</div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm py-1">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center py-0" href="#" onclick="loadPage('characters')">
            
            <img src="https://static.vecteezy.com/system/resources/thumbnails/027/127/497/small_2x/genshin-impact-logo-genshin-impact-icon-transparent-free-png.png" 
                 alt="Genshin Logo" 
                 style="height: 100px; margin-top: -20px; margin-bottom: -20px;" 
                 class="me-2">
            Genshin Impact Archive
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: var(--theme-accent);">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" id="nav-home" onclick="loadPage('home')">Home</a></li>
            <li class="nav-item"><a class="nav-link active" id="nav-characters" onclick="loadPage('characters')">Characters</a></li>
            <li class="nav-item"><a class="nav-link" id="nav-weapons" onclick="loadPage('weapons')">Weapons</a></li>
            <li class="nav-item"><a class="nav-link" id="nav-artifacts" onclick="loadPage('artifacts')">Artifacts</a></li>
            <li class="nav-item"><a class="nav-link" id="nav-elements" onclick="loadPage('elements')">Elements</a></li>
            <li class="nav-item"><a class="nav-link" id="nav-nations" onclick="loadPage('nations')">Nations</a></li>
          </ul>
        </div>
      </div>
    </nav>

    
    <header class="hero">
      <div class="container">
        <h1 id="pageTitle" class="display-4" style="color: var(--theme-accent); font-weight: 700;">Characters</h1>
        <p id="pageSubtitle" class="lead text-light">Explore the heroes traversing the world of Genshin.</p>
      </div>
    </header>

    
    <main class="container my-5 flex-grow-1">
      <div id="loader" class="text-center my-5">
        <div class="spinner-border" role="status"></div>
        <p class="mt-3" style="font-family: 'Montserrat', sans-serif;">Connecting to Irminsul...</p>
      </div>
      
      <div class="row g-4" id="dataGrid">
        <!-- JS will inject the API data here -->
      </div>
    </main>

    
    <footer class="text-center py-4" style="background-color: var(--theme-card); border-top: 1px solid rgba(0, 180, 216, 0.3);">
      <p class="mb-0 small text-light opacity-75">Powered by genshin.jmp.blue API | Ad Astra Abyssosque</p>
    </footer>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    
    <script>
      const baseUrl = 'https://genshin.jmp.blue';
const dataGrid = document.getElementById('dataGrid');
const loader = document.getElementById('loader');
const pageTitle = document.getElementById('pageTitle');
const pageSubtitle = document.getElementById('pageSubtitle');

const pageInfo = {
    home: { title: "Welcome, Traveler!", sub: "Ad Astra Abyssosque! Step into the vast world of Teyvat." },
    characters: { title: "Characters", sub: "Explore the heroes traversing the world of Teyvat." },
    weapons: { title: "Weapons", sub: "Discover the armaments forged for battle." },
    artifacts: { title: "Artifacts", sub: "Relics of the past that bestow great power." },
    elements: { title: "Elements", sub: "The fundamental powers that shape the world." },
    nations: { title: "Nations", sub: "The seven regions ruled by the Archons." }
};

// Function 1: Load Page (Home or Category)
async function loadPage(endpoint) {
    document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
    document.getElementById(`nav-${endpoint}`).classList.add('active');
    
    pageTitle.textContent = pageInfo[endpoint].title;
    pageSubtitle.textContent = pageInfo[endpoint].sub;
    dataGrid.innerHTML = '';
    loader.style.display = 'block';

    try {
        if (endpoint === 'home') {
            // Home Logic: Fetch and Display All Categories
            const categories = ['characters', 'weapons', 'artifacts', 'elements', 'nations'];
            
            for (const cat of categories) {
                const response = await fetch(`${baseUrl}/${cat}`);
                const items = await response.json();
                
                // Add Section Header for each category
                const sectionTitle = `<div class="col-12 mt-5 mb-2"><h2 class="text-accent border-bottom border-info pb-2" style="text-transform: capitalize;">${cat}</h2></div>`;
                dataGrid.insertAdjacentHTML('beforeend', sectionTitle);

                // Display a few items for preview or change slice() to see more
                items.slice(0, 4).forEach(item => {
                    renderCard(cat, item);
                });

                // Add "View All" link per section
                const viewAll = `<div class="col-12 text-end mb-4"><a href="#" class="text-info small text-decoration-none" onclick="loadPage('${cat}')">View all ${cat} →</a></div>`;
                dataGrid.insertAdjacentHTML('beforeend', viewAll);
            }
        } else {
            // Individual Category View[cite: 2]
            const response = await fetch(`${baseUrl}/${endpoint}`);
            const items = await response.json();
            items.forEach(item => renderCard(endpoint, item));
        }
        loader.style.display = 'none';
    } catch (error) {
        console.error("API Error:", error);
        loader.style.display = 'none';
        dataGrid.innerHTML = `<div class="col-12 text-center text-danger"><p>Failed to connect to the Ley Lines.</p></div>`;
    }
}

// Function 2: Helper to Render Individual Cards
function renderCard(endpoint, item) {
    let displayName = item.replace(/-/g, ' ').replace(/ s /g, "'s ");
    let imageUrl = `${baseUrl}/${endpoint}/${item}/icon`;
    let fallbackUrl = `https://placehold.co/100x100/162447/00b4d8?text=No+Data`; 

    if (endpoint === 'artifacts') imageUrl = `${baseUrl}/${endpoint}/${item}/flower-of-life`;
    if (item === 'glacier-and-snowfield') imageUrl = `https://genshin.jmp.blue/artifacts/blizzard-strayer/flower-of-life`;

    const card = `
        <div class="col-6 col-md-4 col-lg-3">
            <div class="genshin-card" style="cursor: pointer;" onclick="loadDetails('${endpoint}', '${item}')">
                <img src="${imageUrl}" alt="${displayName}" class="item-icon" onerror="this.onerror=null; this.src='${fallbackUrl}';">
                <h3 class="item-name">${displayName}</h3>
            </div>
        </div>
    `;
    dataGrid.insertAdjacentHTML('beforeend', card);
}

// Function 3: Load Details
async function loadDetails(endpoint, item) {
    dataGrid.innerHTML = '';
    loader.style.display = 'block';
    window.scrollTo(0, 0);

    try {
        const response = await fetch(`${baseUrl}/${endpoint}/${item}`);
        const data = await response.json();
        let detailHtml = '';
        const displayName = item.replace(/-/g, ' ');

        // Image Handling
        let detailImgUrl = `${baseUrl}/${endpoint}/${item}/icon`;
        if (endpoint === 'characters') detailImgUrl = `${baseUrl}/characters/${item}/portrait`;
        if (endpoint === 'artifacts') detailImgUrl = `${baseUrl}/artifacts/${item}/flower-of-life`;
        const imgTag = `<img src="${detailImgUrl}" class="detail-img mb-4" onerror="this.src='https://placehold.co/200x200/162447/00b4d8?text=${displayName}'">`;

        
        if (endpoint === 'nations') {
            // Fetch characters to find who lives here
            const charRes = await fetch(`${baseUrl}/characters`);
            const allChars = await charRes.json();
            const localPeople = allChars.filter(c => c.toLowerCase().includes(item.split('-')[0]) || c.toLowerCase() === item); 
            // Note: Since API names vary, we'll show a "Loading residents..." or manual mapping if needed.
            // For now, let's focus on the Nation Info:

            detailHtml = `
                <div class="col-12">
                    <div class="detail-container text-center">
                        ${imgTag}
                        <h1 class="display-5 fw-bold text-accent">${data.name}</h1>
                        <p class="lead mb-4">The ${data.name} is the home of the ${data.element} element, ruled by the Archon ${data.archon}.</p>
                        
                        <div class="row text-start justify-content-center">
                            <div class="col-md-5">
                                <div class="p-3 mb-3 rounded bg-dark border-start border-4 border-info">
                                    <p class="mb-1"><span class="stat-label">Government:</span></p>
                                    <p class="mb-0">${data.controlling_entity}</p>
                                </div>
                                <div class="p-3 mb-3 rounded bg-dark border-start border-4 border-info">
                                    <p class="mb-1"><span class="stat-label">Ideal:</span></p>
                                    <p class="mb-0">Known for their pursuit of <strong>${data.name === 'Mondstadt' ? 'Freedom' : data.name === 'Liyue' ? 'Contracts' : data.name === 'Inazuma' ? 'Eternity' : data.name === 'Sumeru' ? 'Wisdom' : 'Justice'}</strong>.</p>
                                </div>
                            </div>
                            <div class="col-md-5">
                                <div class="p-3 mb-3 rounded bg-dark border-start border-4 border-info">
                                    <p class="mb-1"><span class="stat-label">Motto:</span></p>
                                    <p class="mb-0"><em>"${data.motto}"</em></p>
                                </div>
                                <div class="p-3 mb-3 rounded bg-dark border-start border-4 border-info">
                                    <p class="mb-1"><span class="stat-label">Notable People:</span></p>
                                    <div id="peopleList" class="mt-2">
                                        <span class="small opacity-75 text-light">Explore the characters list to see the heroes of this land.</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        } 
        
        else if (endpoint === 'elements') {
            const reactions = {
                'Anemo': 'Swirl (Absorbs Pyro, Hydro, Cryo, or Electro to deal extra AoE damage).',
                'Geo': 'Crystallize (Creates a shield when it hits Pyro, Hydro, Cryo, or Electro).',
                'Electro': 'Overloaded (Pyro), Superconduct (Cryo), Electro-Charged (Hydro).',
                'Dendro': 'Bloom (Hydro), Quicken (Electro), Burning (Pyro).',
                'Hydro': 'Vaporize (Pyro), Frozen (Cryo), Electro-Charged (Electro).',
                'Pyro': 'Vaporize (Hydro), Melt (Cryo), Overloaded (Electro), Burning (Dendro).',
                'Cryo': 'Melt (Pyro), Frozen (Hydro), Superconduct (Electro).'
            };

            detailHtml = `
                <div class="col-12">
                    <div class="detail-container text-center">
                        ${imgTag}
                        <h1 class="display-5 fw-bold text-accent">${data.name}</h1>
                        <div class="row mt-4 justify-content-center text-start">
                            <div class="col-md-8">
                                <div class="p-4 rounded bg-dark border border-info shadow">
                                    <h5 class="text-accent mb-3"><i class="bi bi-magic"></i> Elemental Mechanics</h5>
                                    <p class="mb-3">The <strong>${data.name}</strong> element is a fundamental force in Teyvat.</p>
                                    <div class="reaction-box">
                                        <p class="stat-label mb-2">Common Reactions:</p>
                                        <p class="text-light mb-0">${reactions[data.name] || 'Reacts with other elements to create powerful combat effects.'}</p>
                                    </div>
                                    <div class="mt-3">
                                        <p class="small opacity-75">Used for exploration puzzles and triggering massive damage in battle.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }
        
        else if (endpoint === 'characters') {
            detailHtml = `<div class="col-12"><div class="detail-container text-center">${imgTag}<h1 class="display-5 fw-bold text-accent">${data.name}</h1><p class="lead">${data.description}</p><div class="row mt-4 text-start justify-content-center"><div class="col-md-4"><p><span class="stat-label">Vision:</span> ${data.vision}</p><p><span class="stat-label">Weapon:</span> ${data.weapon}</p></div><div class="col-md-4"><p><span class="stat-label">Nation:</span> ${data.nation}</p><p><span class="stat-label">Rarity:</span> ${data.rarity} Stars</p></div></div></div></div>`;
        }
        else {
            detailHtml = `<div class="col-12"><div class="detail-container text-center">${imgTag}<h1 class="display-5 fw-bold text-accent">${data.name || displayName}</h1><p class="lead">${data.description || 'Data from the Irminsul tree.'}</p></div></div>`;
        }

        detailHtml += `<div class="col-12 text-center mt-4"><button class="btn back-btn px-5 py-2" onclick="loadPage('${endpoint}')">Back to ${endpoint}</button></div>`;
        dataGrid.innerHTML = detailHtml;
        loader.style.display = 'none';
    } catch (error) {
        console.error("Detail Fetch Error:", error);
        loader.style.display = 'none';
        dataGrid.innerHTML = `<div class="col-12 text-center text-danger"><p>Data error.</p><button class="btn back-btn" onclick="loadPage('${endpoint}')">Back</button></div>`;
    }
}

window.onload = () => loadPage('home');
    </script>
    
  </body>
</html>
